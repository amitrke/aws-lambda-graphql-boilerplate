service: aws-nodejs-typescript

# Add the serverless-webpack plugin
plugins:
  - serverless-plugin-typescript
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x

functions:
  recipe:
    handler: src/handler.recipegql
    events:
      - http:
          method: post
          path: recipe
  hello:
    handler: src/handler.hello
    events:
      - http:
          method: get
          path: hello
